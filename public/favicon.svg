<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">MotleyTech</title>
  <defs>
    <linearGradient id="mGrad" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4FD8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="mGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0B0518"/>
  <text
    x="32"
    y="47"
    text-anchor="middle"
    font-family="'Arial Black', Impact, Haettenschweiler, 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="42"
    fill="url(#mGrad)"
    stroke="#0B0518"
    stroke-width="1.5"
    paint-order="stroke"
    filter="url(#mGlow)"
  >M</text>
</svg>
