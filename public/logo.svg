<svg width="760" height="170" viewBox="0 0 760 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MotleyTech logo</title>
  <desc id="desc">Bold two-tone vaporwave MotleyTech wordmark, MOTLEY in pink and TECH in cyan.</desc>
  <defs>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9AF0"/>
      <stop offset="1" stop-color="#F0299D"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="360" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#7DF9FF"/>
    </linearGradient>
  </defs>
  <rect width="760" height="170" fill="transparent"/>

  <!-- chromatic-aberration ghost layers for retro glow, kept subtle so legibility stays high -->
  <text
    x="25" y="112"
    font-family="'Arial Black', Impact, Haettenschweiler, 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="80"
    letter-spacing="1.5"
    fill="#22D3EE"
    opacity="0.5"
  >MOTLEY<tspan fill="#F0299D">TECH</tspan></text>
  <text
    x="29" y="107"
    font-family="'Arial Black', Impact, Haettenschweiler, 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="80"
    letter-spacing="1.5"
    fill="#F0299D"
    opacity="0.4"
  >MOTLEY<tspan fill="#22D3EE">TECH</tspan></text>

  <!-- main wordmark -->
  <text
    x="27" y="109"
    font-family="'Arial Black', Impact, Haettenschweiler, 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="80"
    letter-spacing="1.5"
  >
    <tspan fill="url(#pinkGrad)">MOTLEY</tspan><tspan fill="url(#cyanGrad)">TECH</tspan>
  </text>

  <!-- horizon accent line, nods to the retrowave grid/sun motif -->
  <rect x="27" y="134" width="700" height="5" fill="url(#pinkGrad)" opacity="0.55"/>
</svg>
