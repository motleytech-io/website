<svg width="760" height="170" viewBox="0 0 760 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MotleyTech logo</title>
  <desc id="desc">Readable hot pink vaporwave cursive MotleyTech wordmark.</desc>
  <defs>
    <linearGradient id="pink" x1="42" y1="38" x2="670" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE8F8"/>
      <stop offset="0.22" stop-color="#FF8BDD"/>
      <stop offset="0.62" stop-color="#FF42CB"/>
      <stop offset="1" stop-color="#FFB0D8"/>
    </linearGradient>
    <filter id="softNeon" x="-10%" y="-36%" width="120%" height="172%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#F472B6" flood-opacity="0.56"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D946EF" flood-opacity="0.28"/>
      <feDropShadow dx="-2" dy="3" stdDeviation="0" flood-color="#22D3EE" flood-opacity="0.44"/>
    </filter>
  </defs>
  <rect width="760" height="170" fill="transparent"/>
  <text
    x="34"
    y="116"
    fill="#17051A"
    stroke="#17051A"
    stroke-width="8"
    stroke-linejoin="round"
    font-family="'Brush Script MT', 'Segoe Script', 'Snell Roundhand', 'Apple Chancery', cursive"
    font-size="108"
    font-weight="700"
    letter-spacing="-1"
  >MotleyTech</text>
  <text
    x="34"
    y="116"
    fill="url(#pink)"
    stroke="#E91EBB"
    stroke-width="0.8"
    stroke-linejoin="round"
    filter="url(#softNeon)"
    font-family="'Brush Script MT', 'Segoe Script', 'Snell Roundhand', 'Apple Chancery', cursive"
    font-size="108"
    font-weight="700"
    letter-spacing="-1"
  >MotleyTech</text>
</svg>
