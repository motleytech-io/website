<svg width="560" height="128" viewBox="0 0 560 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MotleyTech logo</title>
  <desc id="desc">Neon vaporwave MotleyTech wordmark with an MT monogram.</desc>
  <defs>
    <linearGradient id="markGradient" x1="10" y1="10" x2="116" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.48" stop-color="#F0ABFC"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="146" y1="24" x2="548" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.44" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#D946EF" flood-opacity="0.55"/>
    </filter>
